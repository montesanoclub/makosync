name: Release

# Push a tag like v0.1.3 to build the Windows installer and publish a release.
# The tag is the single source of truth for the version.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build deps
        run: pip install pyinstaller pytest

      - name: Set version from tag
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}".TrimStart('v')
          "VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          (Get-Content src/makosync/__init__.py) `
            -replace '__version__ = ".*"', "__version__ = `"$v`"" |
            Set-Content src/makosync/__init__.py
          Write-Host "Building version $v"

      - name: Run tests
        shell: pwsh
        run: |
          $env:PYTHONPATH = "src"
          python -m pytest tests/ -q

      - name: Fetch mdbtools (Manager mode)
        shell: pwsh
        run: . build/fetch_mdbtools.ps1

      - name: Build exe
        shell: pwsh
        run: . build/build_exe.ps1

      - name: Smoke test exe
        shell: pwsh
        run: python build/smoke_exe.py

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}".TrimStart('v')
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$v" build/installer.iss

      - name: Prepare release notes
        shell: pwsh
        run: |
          $f = "build/release_notes_${{ github.ref_name }}.md"
          if (Test-Path $f) { Copy-Item $f notes.md }
          else { "## MakoSync ${{ github.ref_name }}" | Set-Content notes.md }

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: MakoSync ${{ github.ref_name }}
          body_path: notes.md
          files: dist/MakoSync-Setup-*.exe
          fail_on_unmatched_files: true
